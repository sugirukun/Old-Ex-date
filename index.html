<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>賞味期限管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:15px;}
input,select,button,textarea{font-family:inherit;}

/* ===== LOGIN ===== */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:320px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.login-card h1{font-size:18px;font-weight:600;margin-bottom:8px;text-align:center;}
.login-card p{font-size:13px;color:#888;text-align:center;margin-bottom:24px;}
.login-card input{width:100%;font-size:16px;padding:12px 14px;border:1px solid #ddd;border-radius:10px;margin-bottom:12px;outline:none;}
.login-card input:focus{border-color:#185FA5;}
.login-card button{width:100%;font-size:16px;padding:13px;border:none;border-radius:10px;background:#185FA5;color:#fff;cursor:pointer;font-weight:500;}

/* ===== MAIN ===== */
#main-screen{display:none;min-height:100vh;}
.topbar{background:#fff;padding:12px 16px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.topbar h1{font-size:15px;font-weight:600;flex:1;}
.staff-badge{font-size:12px;padding:4px 10px;border-radius:99px;background:#f0f0f0;color:#555;}
.tabs{display:flex;background:#fff;border-bottom:1px solid #eee;position:sticky;top:53px;z-index:99;}
.tab{flex:1;padding:12px;font-size:14px;text-align:center;cursor:pointer;color:#888;border-bottom:2px solid transparent;}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:500;}

/* ===== REGISTER ===== */
#panel-register{padding:16px;}
.section{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;}
.section h3{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;color:#555;margin-bottom:6px;font-weight:500;}
.field input,.field select,.field textarea{width:100%;font-size:16px;padding:11px 13px;border:1px solid #ddd;border-radius:10px;outline:none;background:#fff;color:#1a1a1a;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:#185FA5;}
.field input[readonly]{background:#f8f8f8;color:#888;}
.field textarea{resize:none;height:70px;}
.field .hint{font-size:12px;color:#aaa;margin-top:4px;}

/* カメラ */
.jan-row{display:flex;gap:8px;}
.jan-row input{flex:1;}
.jan-row button{padding:11px 14px;border:1px solid #ddd;border-radius:10px;background:#fff;font-size:13px;cursor:pointer;white-space:nowrap;color:#185FA5;font-weight:500;}
#camera-wrap{margin-top:10px;display:none;}
#camera-wrap video{width:100%;border-radius:10px;background:#000;}
#camera-wrap .cam-hint{font-size:12px;color:#888;text-align:center;margin-top:6px;}
#stop-camera{width:100%;margin-top:8px;padding:10px;border:1px solid #ddd;border-radius:10px;background:#fff;color:#e53;font-size:14px;cursor:pointer;}

/* マスター情報 */
#master-result{display:none;}
.master-card{background:#f0f6ff;border:1px solid #c5d8f5;border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.master-card .m-name{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:6px;}
.master-card .m-row{display:flex;gap:8px;font-size:13px;color:#555;}
.master-card .m-row span{background:#fff;border-radius:6px;padding:2px 8px;border:1px solid #ddd;}

/* 登録ボタン */
.reg-actions{display:flex;gap:10px;margin-top:4px;}
.reg-actions button{flex:1;padding:14px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;border:none;}
.btn-clear{background:#f0f0f0;color:#555;}
.btn-register{background:#185FA5;color:#fff;}

/* ===== LIST ===== */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px;background:#f5f5f5;}
.stat{background:#fff;border-radius:10px;padding:10px 10px 8px;}
.stat-label{font-size:10px;color:#888;margin-bottom:3px;}
.stat-value{font-size:20px;font-weight:600;color:#1a1a1a;}
.stat-value.red{color:#c0392b;}.stat-value.amber{color:#b7600a;}.stat-value.green{color:#1e8449;}
.progress-bar{height:3px;background:#eee;border-radius:2px;margin-top:4px;}
.progress-fill{height:100%;border-radius:2px;background:#1e8449;transition:width .3s;}
.filter-bar{padding:10px 14px;background:#fff;border-bottom:1px solid #eee;display:flex;gap:8px;overflow-x:auto;align-items:center;-webkit-overflow-scrolling:touch;}
.filter-bar label{font-size:12px;color:#888;white-space:nowrap;}
.filter-bar select,.filter-bar input[type=number]{font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;-webkit-appearance:none;white-space:nowrap;}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;}
thead th{padding:8px 9px;text-align:left;font-weight:600;font-size:11px;color:#888;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff;white-space:normal;line-height:1.4;min-width:55px;cursor:pointer;user-select:none;}
thead th:hover{color:#185FA5;}
tbody tr{border-bottom:1px solid #f0f0f0;}
tbody tr:active{background:#f8f8f8;}
tbody tr.checked-row{opacity:.35;}
td{padding:8px 9px;vertical-align:middle;white-space:nowrap;}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;}
.badge-red{background:#fde8e8;color:#c0392b;}
.badge-amber{background:#fef3e2;color:#b7600a;}
.badge-green{background:#e8f8ee;color:#1e8449;}
.badge-gray{background:#f0f0f0;color:#666;}
.badge-purple{background:#f0eeff;color:#5b4bc4;}
input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#185FA5;}
.muted{color:#bbb;font-size:12px;}
.own-label{font-size:10px;color:#aaa;display:block;}
.own-code{font-size:11px;color:#666;font-family:monospace;}
.jan-code{font-family:monospace;font-size:11px;color:#555;letter-spacing:0.5px;width:110px;display:inline-block;}
.empty-row{padding:40px;text-align:center;color:#aaa;font-size:14px;}

/* toggle switches */
.col-toggle-bar{padding:8px 14px;background:#f8f8f8;border-bottom:1px solid #eee;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.col-toggle-bar span{font-size:12px;color:#888;white-space:nowrap;}
.toggle-item{display:flex;align-items:center;gap:5px;}
.toggle-item label{font-size:11px;color:#555;white-space:nowrap;cursor:pointer;}
.toggle{position:relative;width:28px;height:16px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-slider{position:absolute;inset:0;background:#ddd;border-radius:99px;cursor:pointer;transition:.2s;}
.toggle-slider:before{content:'';position:absolute;width:12px;height:12px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s;}
.toggle input:checked+.toggle-slider{background:#185FA5;}
.toggle input:checked+.toggle-slider:before{transform:translateX(12px);}
.th-inner{display:flex;flex-direction:column;gap:2px;}
.th-label{font-size:11px;font-weight:600;color:#888;}
/* ===== DIALOG ===== */
#dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:998;display:none;align-items:center;justify-content:center;padding:20px;}
#dialog-overlay.show{display:flex;}
.dialog-box{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:340px;}
.dialog-box h3{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:8px;}
.dialog-box p{font-size:13px;color:#888;margin-bottom:20px;line-height:1.6;}
.dialog-btn{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:none;margin-bottom:8px;text-align:left;}
.dialog-btn-blue{background:#185FA5;color:#fff;}
.dialog-btn-gray{background:#f0f0f0;color:#555;}
.dialog-btn-cancel{background:none;color:#aaa;font-size:13px;text-align:center;}
/* ===== TOAST ===== */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:99px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999;}
#toast.show{opacity:1;}

/* ===== LOADING ===== */
#loading{position:fixed;inset:0;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;z-index:999;display:none;}
.spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:#185FA5;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading"><div class="spinner"></div></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- DIALOG -->
<div id="dialog-overlay">
  <div class="dialog-box">
    <h3 id="dialog-title"></h3>
    <p id="dialog-msg"></p>
    <button class="dialog-btn dialog-btn-blue" id="dialog-btn1" onclick="dialogAction(1)"></button>
    <button class="dialog-btn dialog-btn-gray" id="dialog-btn2" onclick="dialogAction(2)"></button>
    <button class="dialog-btn dialog-btn-cancel" onclick="closeDialog()">登録しない</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>賞味期限管理</h1>
    <p>担当者名と部門を選択してください</p>
    <input type="text" id="login-name" placeholder="担当者名（例：田中）" />
    <select id="login-dept" style="width:100%;font-size:16px;padding:12px 14px;border:1px solid #ddd;border-radius:10px;margin-bottom:12px;outline:none;background:#fff;color:#1a1a1a;-webkit-appearance:none;">
      <option value="">部門を選択してください</option>
      <option value="店長">店長</option>
      <option value="1課（海産）">1課（海産）</option>
      <option value="2課（日配）">2課（日配）</option>
      <option value="3課（食品）">3課（食品）</option>
      <option value="4課（菓子）">4課（菓子）</option>
      <option value="5課（青果）">5課（青果）</option>
      <option value="6課（雑貨）">6課（雑貨）</option>
      <option value="7課（加工肉）">7課（加工肉）</option>
      <option value="8課（惣菜）">8課（惣菜）</option>
      <option value="9課（玉子）">9課（玉子）</option>
      <option value="11課（鶏肉）">11課（鶏肉）</option>
      <option value="15課（精肉）">15課（精肉）</option>
      <option value="20課（サービス）">20課（サービス）</option>
      <option value="29課（酒）">29課（酒）</option>
      <option value="41課（消耗品）">41課（消耗品）</option>
    </select>
    <button onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <div class="topbar">
    <h1>賞味期限管理</h1>
    <span class="staff-badge" id="staff-disp"></span>
    <span class="staff-badge" id="dept-disp" style="background:#e8f0fe;color:#185FA5;"></span>
  </div>

  <!-- REGISTER -->
  <div id="panel-register">
    <div style="padding:12px 16px 4px;font-size:14px;font-weight:600;color:#555;background:#fff;border-bottom:1px solid #eee;">商品登録</div>
    <div class="section">
      <h3>JANコードを読み込む</h3>
      <div class="jan-row">
        <input type="text" id="jan-input" placeholder="スキャン or 入力" inputmode="numeric" />
        <button onclick="toggleCamera()">📷 バーコード</button>
        <button onclick="toggleOCR()">🔤 棚札OCR</button>
        <button onclick="lookupJAN()">検索</button>
      </div>
      <div id="camera-wrap">
        <div id="camera-video" style="width:100%;border-radius:10px;overflow:hidden;background:#000;min-height:240px;position:relative;"></div>
        <p class="cam-hint">バーコードをカメラに向けてください</p>
        <button id="stop-camera" onclick="stopCamera()">カメラを停止</button>
      </div>
      <div id="ocr-wrap" style="display:none;margin-top:10px;">
        <div style="position:relative;width:100%;">
          <video id="ocr-video" autoplay playsinline muted style="width:100%;border-radius:10px;background:#000;"></video>
          <div id="ocr-guide" style="position:absolute;top:50%;left:25%;right:25%;transform:translateY(-50%);height:50px;border:2px solid #185FA5;border-radius:6px;box-shadow:0 0 0 9999px rgba(0,0,0,0.4);pointer-events:none;"></div>
        </div>
        <p style="font-size:12px;color:#888;text-align:center;margin-top:6px;">青い枠内に7桁の数字だけを合わせてください</p>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button onclick="captureOCR()" style="flex:1;padding:12px;border:none;border-radius:10px;background:#185FA5;color:#fff;font-size:14px;font-weight:500;cursor:pointer;">📸 撮影して読み取る</button>
          <button onclick="stopOCR()" style="padding:12px 14px;border:1px solid #ddd;border-radius:10px;background:#fff;color:#e53;font-size:14px;cursor:pointer;">停止</button>
        </div>
        <div id="ocr-result" style="margin-top:8px;font-size:13px;color:#555;text-align:center;min-height:20px;"></div>
        <canvas id="ocr-canvas" style="display:none;"></canvas>
      </div>
    </div>

    <div id="master-result">
      <div class="section">
        <h3>商品情報（マスターより自動呼び出し）</h3>
        <div class="master-card">
          <div class="m-name" id="m-name">—</div>
          <div class="m-row">
            <span id="m-cat">—</span>
            <span id="m-own">—</span>
            <span id="m-jan" style="font-family:monospace;font-size:11px">—</span>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>入力項目</h3>
        <div class="field">
          <label>通路番号</label>
          <select id="reg-aisle"><option value="">選択してください</option></select>
        </div>
        <div class="field">
          <label>最古賞味期限</label>
          <input type="text" id="reg-expiry" placeholder="yyyymmdd" inputmode="numeric" maxlength="8" />
          <div class="hint">8桁の数字で入力（例：20260410）</div>
        </div>
        <div class="field">
          <label>残日数（自動計算）</label>
          <input type="text" id="reg-days" readonly placeholder="賞味期限を入力すると自動計算" />
        </div>
        <div class="field">
          <label>期限切れ個数</label>
          <input type="number" id="reg-expiredQty" placeholder="0" inputmode="numeric" min="0" value="0" />
        </div>
        <div class="field">
          <label>値下げ処理商品の場所</label>
          <textarea id="reg-discount" placeholder="例：A-1通路端 値下棚"></textarea>
        </div>
        <div class="field">
          <label>担当者</label>
          <input type="text" id="reg-staff" readonly />
        </div>
        <div class="field">
          <label>登録日</label>
          <input type="text" id="reg-date" readonly />
        </div>
      </div>

      <div class="section">
        <div class="reg-actions">
          <button class="btn-clear" onclick="clearForm()">クリア</button>
          <button class="btn-register" onclick="registerItem()">登録する</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LIST -->
  <div id="panel-list">
    <div style="padding:12px 16px 4px;font-size:14px;font-weight:600;color:#555;background:#fff;border-top:3px solid #185FA5;border-bottom:1px solid #eee;">一覧・確認</div>
    <div class="stats">
      <div class="stat"><div class="stat-label">総商品数</div><div class="stat-value" id="s-total">0</div></div>
      <div class="stat"><div class="stat-label">期限切れ</div><div class="stat-value red" id="s-expired">0</div></div>
      <div class="stat"><div class="stat-label">警告圏内</div><div class="stat-value amber" id="s-warn">0</div></div>
      <div class="stat"><div class="stat-label">確認済み</div><div class="stat-value green" id="s-done">0</div>
        <div class="progress-bar"><div class="progress-fill" id="s-prog" style="width:0%"></div></div>
      </div>
    </div>
    <div class="filter-bar">
      <label>絞込：</label>
      <select id="filter-status" onchange="renderList()">
        <option value="all">すべて</option>
        <option value="expired">期限切れ</option>
        <option value="warn" selected>警告圏内</option>
        <option value="ok">余裕あり</option>
      </select>
      <label>履歴：</label>
      <select id="filter-archive" onchange="loadList()">
        <option value="current">現役のみ</option>
        <option value="archive">履歴を含む</option>
      </select>
      <label>通路：</label>
      <select id="filter-aisle" onchange="renderList()"><option value="all">すべて</option></select>
      <span id="dept-filter-wrap" style="display:none;align-items:center;gap:8px;"><label>部門：</label><select id="filter-dept" onchange="renderList()"><option value="all">すべて</option></select></span>
      <label>カテゴリ：</label>
      <select id="filter-cat" onchange="renderList()"><option value="all">すべて</option></select>
      <label>アラート：</label>
      <button onclick="changeAlertDays(-1)" style="padding:4px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:16px;cursor:pointer;">－</button>
      <span id="alert-days-disp" style="font-size:13px;font-weight:500;min-width:24px;text-align:center;display:inline-block;">7</span>
      <button onclick="changeAlertDays(1)" style="padding:4px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:16px;cursor:pointer;">＋</button>
      <label>日以内</label>
    </div>
    <div style="padding:6px 14px;background:#f8f8f8;border-bottom:1px solid #eee;display:flex;align-items:center;gap:12px;">
      <span style="font-size:12px;color:#888;">列の表示：</span>
      <button id="mode-default" onclick="setColMode('default')" style="font-size:12px;color:#185FA5;font-weight:700;background:none;border:none;cursor:pointer;padding:2px 0;">デフォルト</button>
      <button id="mode-custom" onclick="setColMode('custom')" style="font-size:12px;color:#888;font-weight:400;background:none;border:none;cursor:pointer;padding:2px 0;">カスタム</button>
    </div>
    <div class="col-toggle-bar" id="col-toggle-bar" style="display:none;">
      <span>列の表示：</span>
      <div class="toggle-item"><label class="toggle"><input type="checkbox" data-col="1" onchange="toggleCol(1,this.checked)"><span class="toggle-slider"></span></label><label>部門</label></div>
      <div class="toggle-item"><label class="toggle"><input type="checkbox" data-col="2" checked onchange="toggleCol(2,this.checked)"><span class="toggle-slider"></span></label><label>通路</label></div>
      <div class="toggle-item"><label class="toggle"><input type="checkbox" data-col="3" onchange="toggleCol(3,this.checked)"><span class="toggle-slider"></span></label><label>JANコード</label></div>
      <div class="toggle-item"><label class="toggle"><input type="checkbox" data-col="4" checked onchange="toggleCol(4,this.checked)"><span class="toggle-slider"></span></label><label>自社コード</label></div>
      <div class="toggle-item"><label class="toggle"><input type="checkbox" data-col="5" checked onchange="toggleCol(5,this.checked)"><span class="toggle-slider"></span></label><label>商品名</label></div>
      <div class="toggle-item"><label class="toggle"><input type="checkbox" data-col="6" onchange="toggleCol(6,this.checked)"><span class="toggle-slider"></span></label><label>カテゴリ</label></div>
      <div class="toggle-item"><label class="toggle"><input type="checkbox" data-col="7" checked onchange="toggleCol(7,this.checked)"><span class="toggle-slider"></span></label><label>最古賞味期限</label></div>
      <div class="toggle-item"><label class="toggle"><input type="checkbox" data-col="8" checked onchange="toggleCol(8,this.checked)"><span class="toggle-slider"></span></label><label>期限切れ個数</label></div>
      <div class="toggle-item"><label class="toggle"><input type="checkbox" data-col="9" onchange="toggleCol(9,this.checked)"><span class="toggle-slider"></span></label><label>販売期限切れ日</label></div>
      <div class="toggle-item"><label class="toggle"><input type="checkbox" data-col="10" checked onchange="toggleCol(10,this.checked)"><span class="toggle-slider"></span></label><label>残日数</label></div>
      <div class="toggle-item"><label class="toggle"><input type="checkbox" data-col="11" checked onchange="toggleCol(11,this.checked)"><span class="toggle-slider"></span></label><label>値下処理商品の場所</label></div>
      <div class="toggle-item"><label class="toggle"><input type="checkbox" data-col="12" onchange="toggleCol(12,this.checked)"><span class="toggle-slider"></span></label><label>担当者</label></div>
      <div class="toggle-item"><label class="toggle"><input type="checkbox" data-col="13" onchange="toggleCol(13,this.checked)"><span class="toggle-slider"></span></label><label>登録日</label></div>
    </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-col="0">済</th>
            <th style="width:36px;min-width:36px;">削除</th>
            <th data-col="1" onclick="sortBy('department')">部門 ↕</th>

// ===== CAMERA =====
let barcodeDetectorActive=false;
let barcodeDetectorTimer=null;
let barcodeStream=null;

async function toggleCamera(){
  if(cameraActive){stopCamera();return;}
  const wrap=document.getElementById('camera-wrap');
  wrap.style.display='block';

  // BarcodeDetector APIが使えるか確認
  if('BarcodeDetector' in window){
    await startBarcodeDetector();
  } else {
    await startQuagga();
  }
}

async function startBarcodeDetector(){
  try{
    const detector=new BarcodeDetector({formats:[
      'ean_13','ean_8','code_39','code_128','itf','codabar','upc_a','upc_e'
    ]});
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}
    });
    barcodeStream=stream;
    // videoタグを動的に作成
    const wrap=document.getElementById('camera-wrap');
    let video=document.getElementById('bd-video');
    if(!video){
      video=document.createElement('video');
      video.id='bd-video';
      video.autoplay=true;
      video.playsInline=true;
      video.muted=true;
      video.style.cssText='width:100%;border-radius:10px;background:#000;';
      document.getElementById('camera-video').appendChild(video);
    }
    video.srcObject=stream;
    cameraActive=true;
    barcodeDetectorActive=true;
    const scan=async()=>{
      if(!barcodeDetectorActive)return;
      try{
        const results=await detector.detect(video);
        if(results.length>0){
          let code=results[0].rawValue;
          code=code.replace(/^[A-Da-d]/,'').replace(/[A-Da-d]$/,'');
          document.getElementById('jan-input').value=code;
          stopCamera();
          lookupJAN();
          return;
        }
      }catch(e){}
      barcodeDetectorTimer=setTimeout(scan,200);
    };
    video.addEventListener('play',scan,{once:true});
  }catch(e){
    toast('カメラを起動できませんでした');
    document.getElementById('camera-wrap').style.display='none';
  }
}

async function startQuagga(){
  try{
    await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  }catch(e){
    toast('カメラの許可が必要です');
    document.getElementById('camera-wrap').style.display='none';
    return;
  }
  Quagga.init({
    inputStream:{
      type:'LiveStream',
      target:document.getElementById('camera-video'),
      constraints:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},
    },
    decoder:{readers:['ean_reader','ean_8_reader','code_39_reader','i2of5_reader','code_128_reader','codabar_reader']},
    locate:true,
  },function(err){
    if(err){
      toast('カメラを起動できませんでした');
      document.getElementById('camera-wrap').style.display='none';
      return;
    }
    Quagga.start();
    cameraActive=true;
  });
  Quagga.onDetected(function(result){
    let code=result.codeResult.code;
    if(code){
      code=code.replace(/^[A-Da-d]/,'').replace(/[A-Da-d]$/,'');
      document.getElementById('jan-input').value=code;
      stopCamera();
      lookupJAN();
    }
  });
}

function stopCamera(){
  if(barcodeDetectorActive){
    barcodeDetectorActive=false;
    if(barcodeDetectorTimer)clearTimeout(barcodeDetectorTimer);
    if(barcodeStream)barcodeStream.getTracks().forEach(t=>t.stop());
    const v=document.getElementById('bd-video');
    if(v)v.remove();
  } else if(cameraActive){
    Quagga.stop();
  }
  cameraActive=false;
  document.getElementById('camera-wrap').style.display='none';
}

// ===== OCR =====
let ocrStream=null;

async function toggleOCR(){
  if(ocrStream){stopOCR();return;}
  const wrap=document.getElementById('ocr-wrap');
  wrap.style.display='block';
  if(cameraActive)stopCamera();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}
    });
    ocrStream=stream;
    document.getElementById('ocr-video').srcObject=stream;
  }catch(e){
    toast('カメラを起動できませんでした');
    wrap.style.display='none';
  }
}

function stopOCR(){
  if(ocrStream){ocrStream.getTracks().forEach(t=>t.stop());ocrStream=null;}
  document.getElementById('ocr-wrap').style.display='none';
  document.getElementById('ocr-result').textContent='';
}

async function captureOCR(){
  const video=document.getElementById('ocr-video');
  const canvas=document.getElementById('ocr-canvas');
  const resultEl=document.getElementById('ocr-result');
  resultEl.textContent='読み取り中...';

  // ガイド枠（左25%〜右75%、中央の高さ50px相当）を切り出してスケールアップ
  const vw=video.videoWidth, vh=video.videoHeight;
  const cropX=Math.floor(vw*0.25);
  const cropW=Math.floor(vw*0.5);
  const cropH=Math.floor(vh*0.15);
  const cropY=Math.floor(vh*0.5-cropH/2);
  const scale=3;
  canvas.width=cropW*scale;
  canvas.height=cropH*scale;
  const ctx=canvas.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(video,cropX,cropY,cropW,cropH,0,0,canvas.width,canvas.height);

  // グレースケール＋コントラスト強調
  const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
  const d=imgData.data;
  for(let i=0;i<d.length;i+=4){
    const gray=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    const val=gray>140?255:0;
    d[i]=d[i+1]=d[i+2]=val;
  }
  ctx.putImageData(imgData,0,0);

  try{
    const result=await Tesseract.recognize(canvas,'eng',{
      logger:()=>{},
      tessedit_char_whitelist:'0123456789 ',
      tessedit_pageseg_mode:'6',
    });
    const text=result.data.text;
    resultEl.textContent='読み取り結果：'+text.replace(/\n/g,' ').trim();
    // 7桁の数字を探す
    const matches=text.match(/\d{6,8}/g);
    if(matches){
      // 7桁に最も近いものを選択
      const code=matches.find(m=>m.length===7)||matches[0];
      resultEl.textContent='読み取り成功：'+code;
      document.getElementById('jan-input').value=code;
      stopOCR();
      lookupJAN();
    } else {
      resultEl.textContent='数字が見つかりませんでした。棚札をもっと近づけて再度撮影してください。';
    }
  }catch(e){
    resultEl.textContent='読み取りに失敗しました：'+e.message;
  }
}

// ===== JAN LOOKUP =====
async function lookupJAN(){
  let code=document.getElementById('jan-input').value.trim();
  if(!code){toast('JANコードを入力してください');return;}
  showLoading(true);
  // JANコードで検索
  let {data,error}=await sb.from('products').select('*').eq('jan',code).single();
  // 見つからなければ自社コードで検索
  if(error||!data){
    const res=await sb.from('products').select('*').eq('own_code',code).single();
    data=res.data; error=res.error;
  }
  showLoading(false);
  if(error||!data){toast('商品マスターに存在しません');return;}
  currentMaster=data;
  document.getElementById('m-name').textContent=data.name;
  document.getElementById('m-cat').textContent=data.category;
  document.getElementById('m-own').textContent=data.own_code;
  document.getElementById('m-jan').textContent=data.jan;
  document.getElementById('master-result').style.display='block';

  // 既存登録があれば通路・賞味期限を引き継ぐ
  const aisle=document.getElementById('reg-aisle').value;
  if(aisle){
    const {data:rec}=await sb.from('expiry_records').select('*').eq('jan',data.jan).eq('aisle',aisle).single();
    if(rec){
      const exStr=rec.expiry.replace(/-/g,'');
      document.getElementById('reg-expiry').value=exStr;
      document.getElementById('reg-expiredQty').value=rec.expired_qty||0;
      document.getElementById('reg-discount').value=rec.discount_location||'';
      updateDays(exStr);
    }
  }
  toast('商品情報を読み込みました');
}

// 賞味期限→残日数
function updateDays(v){
  const val=(v||document.getElementById('reg-expiry').value).replace(/\D/g,'');
  if(val.length===8){
    const dt=new Date(`${val.slice(0,4)}-${val.slice(4,6)}-${val.slice(6,8)}`);
    dt.setHours(0,0,0,0);
    const diff=Math.round((dt-today)/86400000);
    document.getElementById('reg-days').value=isNaN(diff)?'':diff+'日';
  }else{
    document.getElementById('reg-days').value='';
  }
}
document.addEventListener('DOMContentLoaded',()=>{
  const ei=document.getElementById('reg-expiry');
  if(ei)ei.addEventListener('input',()=>updateDays());
});

// ===== REGISTER =====
let pendingRegister=null;

async function registerItem(){
  if(!currentMaster){toast('JANコードを読み込んでください');return;}
  const aisle=document.getElementById('reg-aisle').value;
  const expiryRaw=document.getElementById('reg-expiry').value.replace(/\D/g,'');
  const qty=parseInt(document.getElementById('reg-expiredQty').value)||0;
  const discount=document.getElementById('reg-discount').value.trim();

  if(expiryRaw.length!==8){toast('賞味期限を8桁で入力してください\n例：20260410');return;}
  const ep=expiryRaw;
  const expiryFmt=`${ep.slice(0,4)}-${ep.slice(4,6)}-${ep.slice(6,8)}`;
  const sellByDt=new Date(parseInt(ep.slice(0,4)),parseInt(ep.slice(4,6))-1,parseInt(ep.slice(6,8)));

    document.getElementById('dialog-overlay').classList.add('show');
    return;
  }
  await doRegister(currentMaster.jan,aisle,expiryFmt,qty,sellByFmt,discount);
}

function closeDialog(){
  document.getElementById('dialog-overlay').classList.remove('show');
  pendingRegister=null;
}

async function dialogAction(btn){
  if(!pendingRegister)return;
  const{jan,aisle,expiryFmt,qty,sellByFmt,discount}=pendingRegister;
  closeDialog();
  if(btn===1){
    // 同じ通路・同じ期限が済でない場合は新規追加、済の場合は上書き
    const sameAisleRecords=listData.filter(r=>r.jan===jan&&r.aisle===aisle);
    const unchecked=sameAisleRecords.filter(r=>!r.checked);
    if(unchecked.length>0){
      // 古い未済レコードを済にする
      for(const rec of unchecked){
        await sb.from('expiry_records').update({checked:true,expired_qty:0}).eq('id',rec.id);
      }

    // 新規追加（upsertではなくinsert）
    showLoading(true);

      jan,aisle,expiry:expiryFmt,expired_qty:qty,
      sell_by:sellByFmt,discount_location:discount,
      staff:currentStaff,registered_at:todayStr(),checked:false
    });

    if(error){toast('登録に失敗しました：'+error.message);return;}
    toast('登録しました：'+currentMaster.name+' / '+aisle);

    loadList();

  }
}

// ===== LIST =====
async function loadList(){
  showLoading(true);
  const archiveMode=document.getElementById('filter-archive')?.value||'current';
  let current=[], archives=[];

  const {data:d1,error:e1}=await sb
    .from('expiry_records')
    .select('*, products(name, own_code, category, department)')
    .order('expiry',{ascending:true});
  if(e1){showLoading(false);toast('データ取得に失敗しました');return;}
  current=d1.map(r=>({
    ...r,
    name:r.products?.name||'—',
    own_code:r.products?.own_code||'—',
    category:r.products?.category||'—',
    department:r.products?.department||'—',
    days:daysLeft(r.expiry),
    is_archive:false
  }));

  if(archiveMode==='archive'){
    const {data:d2}=await sb
      .from('expiry_archives')
      .select('*')
      .order('checked_at',{ascending:false});
    if(d2){
      archives=d2.map(r=>({
        ...r,
        days:daysLeft(r.expiry),
        checked:true,
        is_archive:true
      }));
    }
  }

  listData=[...current,...archives];
  showLoading(false);
  populateFilterSelects();
  renderList();
}

function populateFilterSelects(){
  const aisles=[...new Set(listData.map(d=>d.aisle))].sort((a,b)=>{
    const n1=parseInt(a),n2=parseInt(b);
    if(n1!==n2)return n1-n2;
    return a.slice(-1).localeCompare(b.slice(-1));
  });
  const cats=[...new Set(listData.map(d=>d.category))].sort();
  const depts=[...new Set(listData.map(d=>d.department).filter(d=>d&&d!=='—'))].sort();
  const as=document.getElementById('filter-aisle');
  const cs=document.getElementById('filter-cat');
  const ds=document.getElementById('filter-dept');
  const ca=as.value,cc=cs.value,cd=ds.value;
  as.innerHTML='<option value="all">すべて</option>';
  cs.innerHTML='<option value="all">すべて</option>';
  ds.innerHTML='<option value="all">すべて</option>';
  aisles.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;as.appendChild(o);});
  cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cs.appendChild(o);});
  depts.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;ds.appendChild(o);});
  if(ca)as.value=ca;if(cc)cs.value=cc;
  // ログイン時の部門を初期選択
  const deptFilterWrap=document.getElementById('dept-filter-wrap');
  if(currentDept==='店長'){
    if(deptFilterWrap)deptFilterWrap.style.display='flex';
    if(currentDept&&!cd)ds.value='all';else if(cd)ds.value=cd;
  }else{
    if(deptFilterWrap)deptFilterWrap.style.display='none';
    ds.value=currentDept;
  }
}

function badgeFor(days,ad){
  const s=statusOf(days,ad);
  if(s==='expired')return`<span class="badge badge-red">期限切れ</span>`;
  if(s==='warn')return`<span class="badge badge-amber">${days}日</span>`;
  return`<span class="badge badge-green">${days}日</span>`;
}

// ===== COLUMN TOGGLE =====
const DEFAULT_HIDDEN = new Set([1,3,6,9,12,13]);
let hiddenCols = new Set(DEFAULT_HIDDEN);
let colMode = 'default';

function setColMode(mode){
  colMode = mode;
  if(mode==='default'){
    hiddenCols = new Set(DEFAULT_HIDDEN);
    // トグルスイッチをデフォルト状態に同期
    document.querySelectorAll('.col-toggle-bar input[type=checkbox]').forEach(cb=>{
      const col=parseInt(cb.getAttribute('data-col'));
      cb.checked=!DEFAULT_HIDDEN.has(col);
    });
  }
  document.getElementById('mode-default').style.fontWeight=mode==='default'?'700':'400';
  document.getElementById('mode-custom').style.fontWeight=mode==='custom'?'700':'400';
  document.getElementById('mode-default').style.color=mode==='default'?'#185FA5':'#888';
  document.getElementById('mode-custom').style.color=mode==='custom'?'#185FA5':'#888';
  document.getElementById('col-toggle-bar').style.display=mode==='custom'?'flex':'none';
  applyColVisibility();
}
let alertDays=7;
function changeAlertDays(d){alertDays=Math.min(60,Math.max(1,alertDays+d));document.getElementById('alert-days-disp').textContent=alertDays;renderList();}

function toggleCol(col, visible){
  if(visible) hiddenCols.delete(col);
  else hiddenCols.add(col);
  applyColVisibility();
}

function applyColVisibility(){
  const table = document.querySelector('#panel-list table');
  if(!table) return;
  const rows = table.querySelectorAll('tr');
  rows.forEach(row=>{
    const cells = row.children;
    for(let i=0;i<cells.length;i++){
      const col = cells[i].getAttribute('data-col') !== null
        ? parseInt(cells[i].getAttribute('data-col'))
        : i;
      cells[i].style.display = hiddenCols.has(col) ? 'none' : '';
    }
  });
}

function sortBy(key){if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=1;}renderList();}

function renderList(){
  const ad=alertDays;
  const fs=document.getElementById('filter-status').value;
  const fa=document.getElementById('filter-aisle').value;
  const fc=document.getElementById('filter-cat').value;
  const fd=document.getElementById('filter-dept').value;
  let rows=listData.map(r=>({...r,days:daysLeft(r.expiry)}));
  if(fa!=='all')rows=rows.filter(r=>r.aisle===fa);
  if(fc!=='all')rows=rows.filter(r=>r.category===fc);
  if(currentDept!=='店長')rows=rows.filter(r=>r.department===currentDept);
  else if(fd!=='all')rows=rows.filter(r=>r.department===fd);
  if(fs!=='all')rows=rows.filter(r=>statusOf(r.days,ad)===fs);
  rows.sort((a,b)=>{
    let av=a[sortKey],bv=b[sortKey];
    if(['expiry','sell_by','registered_at'].includes(sortKey)){av=new Date(av);bv=new Date(bv);}
    if(sortKey==='aisle'){const n1=parseInt(av),n2=parseInt(bv);if(n1!==n2)return(n1-n2)*sortDir;av=String(av).slice(-1);bv=String(bv).slice(-1);}
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  const exp=listData.filter(r=>daysLeft(r.expiry)<0).length;
  const warn=listData.filter(r=>{const d=daysLeft(r.expiry);return d>=0&&d<=ad;}).length;
  const done=listData.filter(r=>r.checked).length;
  document.getElementById('s-total').textContent=listData.length;
  document.getElementById('s-expired').textContent=exp;
  document.getElementById('s-warn').textContent=warn;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-prog').style.width=listData.length?Math.round(done/listData.length*100)+'%':'0%';
  const tbody=document.getElementById('tbody');
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="14" class="empty-row">該当する商品はありません</td></tr>`;return;}
  tbody.innerHTML=rows.map(r=>{
    const qtyCell=r.expired_qty>0?`<span class="badge badge-red">${r.expired_qty}個</span>`:`<span class="muted">—</span>`;
    const locCell=r.discount_location?`<span class="badge badge-purple">${r.discount_location}</span>`:`<span class="muted">—</span>`;
    return`<tr class="${r.checked?'checked-row':''}">
      <td data-col="0" style="text-align:center"><input type="checkbox" ${r.checked?'checked':''} onchange="toggleCheck('${r.id}',${r.checked})"></td>
      <td style="text-align:center"><button onclick="deleteRecord('${r.id}',${r.is_archive||false})" style="background:none;border:none;font-size:16px;cursor:pointer;color:#e53;">🗑</button></td>
      <td data-col="1"><span class="badge" style="background:#e8f0fe;color:#185FA5;">${r.department||'—'}</span></td>
      <td data-col="2"><span class="badge badge-gray">${r.aisle}</span></td>
      <td data-col="3"><span class="jan-code">${r.jan}</span></td>
      <td data-col="4"><span class="own-label">自社</span><span class="own-code">${r.own_code}</span></td>
      <td data-col="5" style="font-weight:600">${r.name}</td>
      <td data-col="6"><span class="badge badge-gray">${r.category}</span></td>
      <td data-col="7">${r.expiry}</td>
      <td data-col="8" style="text-align:center">${qtyCell}</td>
      <td data-col="9">${r.sell_by||'—'}</td>
      <td data-col="10">${badgeFor(r.days,ad)}</td>
      <td data-col="11">${locCell}</td>
      <td data-col="12" style="color:#888">${r.staff}</td>
      <td data-col="13" style="color:#888;font-size:11px">${r.registered_at}</td>
    </tr>`;
  }).join('');

  applyColVisibility();
}

async function deleteRecord(id, isArchive){
  if(!confirm('このデータを完全に削除しますか？\nこの操作は取り消せません。'))return;
  showLoading(true);
  if(isArchive){
    await sb.from('expiry_archives').delete().eq('id',id);
  } else {
    await sb.from('expiry_records').delete().eq('id',id);
  }
  showLoading(false);
  toast('削除しました');
  loadList();
}

async function toggleCheck(id,current){
  const item=listData.find(r=>r.id===id);
  if(!item)return;

  if(!current){
    // 済にする→アーカイブに移動
    const{error:archErr}=await sb.from('expiry_archives').insert({
      jan:item.jan,
      aisle:item.aisle,
      expiry:item.expiry,
      expired_qty:0,
      sell_by:item.sell_by,
      discount_location:item.discount_location,
      staff:item.staff,
      registered_at:item.registered_at,
      checked_at:todayStr(),
      department:item.department,
      name:item.name,
      own_code:item.own_code,
      category:item.category
    });
    if(archErr){toast('アーカイブに失敗しました：'+archErr.message);return;}
    const{error:delErr}=await sb.from('expiry_records').delete().eq('id',id);
    if(delErr){toast('削除に失敗しました：'+delErr.message);return;}
    toast('済にしてアーカイブしました');
  } else {
    // 済を解除→アーカイブから戻す
    const{error:restErr}=await sb.from('expiry_records').insert({
      jan:item.jan,
      aisle:item.aisle,
      expiry:item.expiry,
      expired_qty:item.expired_qty,
      sell_by:item.sell_by,
      discount_location:item.discount_location,
      staff:item.staff,
      registered_at:item.registered_at,
      checked:false
    });
    if(restErr){toast('復元に失敗しました：'+restErr.message);return;}
    await sb.from('expiry_archives').delete().eq('id',id);
    toast('済を解除して現役に戻しました');
  }
  loadList();
}
</script>
